# ==========================================
# 1. METADATEN DES PROJEKTS
# ==========================================
name: fachinformatiker_trainer
description: "A new Flutter project."

# Verhindert die Veröffentlichung auf pub.dev
publish_to: "none"

# Semantic Versioning
version: 1.0.0+1

# ==========================================
# 2. UMGEBUNG (ENVIRONMENT)
# ==========================================
environment:
  sdk: ">=3.9.0 <4.0.0"

# ==========================================
# 3. PRODUKTIV-ABHÄNGIGKEITEN
# ==========================================
dependencies:
  # Flutter
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Datenbank
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.5.5

  # UI
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0

  # System
  file_selector: ^1.1.0
  audioplayers: ^6.8.0

# ==========================================
# 4. ENTWICKLER-ABHÄNGIGKEITEN
# ==========================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# ==========================================
# 5. FLUTTER-SPEZIFISCHE KONFIGURATION
# ==========================================
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/

# ==========================================
# 6. FLUTTER LAUNCHER ICONS
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows: 
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  linux:
    generate: true
    image_path: "assets/icon/app_icon.png"
    
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21